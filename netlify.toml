[build]
  base      = "frontend"
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# API Redirects
# Replace 'https://your-backend-api.onrender.com' with your actual backend URL once deployed.
[[redirects]]
  from   = "/api/*"
  to     = "https://your-backend-api.onrender.com/api/:splat"
  status = 200

# Redirect all routes to index.html for SPA (React Router)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
