[build]
  base      = "frontend"
  command   = "npm ci && npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20.11.0"
  VITE_API_BASE_URL = "https://axio-backend.onrender.com"

# Redirect all routes to index.html for SPA (React Router)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
