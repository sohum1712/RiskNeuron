services:
  # 1. FastAPI Backend (Web Service)
  - type: web
    name: axio-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    region: singapore # Choose the region closest to you
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: axio-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "*" # Initially permit all, narrow down to frontend URL later
      - key: OPENWEATHER_API_KEY
        sync: false # Set this manually in the Render dashboard

  # 2. React Frontend (Static Site)
  - type: static_site
    name: axio-frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: axio-backend
          property: host

databases:
  # 3. PostgreSQL Database
  - name: axio-db
    plan: free
    region: singapore
