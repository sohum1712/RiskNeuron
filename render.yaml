services:
  # FastAPI Backend (Web Service)
  - type: web
    name: axio-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: axio-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "*"
      - key: OPENWEATHER_API_KEY
        sync: false

databases:
  # PostgreSQL Database
  - name: axio-db
    plan: free
    region: singapore
